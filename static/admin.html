<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121416">
  <title>Админка - Anime Catalog</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/client_errors.js"></script>
</head>
<body class="admin-page">
  <main class="admin-shell">
    <header class="admin-header">
      <div class="admin-title">
        <h1>Админка</h1>
        <p id="admin-account"></p>
      </div>
      <div class="admin-actions">
        <a class="icon-button icon-link" href="/" aria-label="Каталог" title="Каталог">▦</a>
        <button id="admin-logout" class="icon-button" type="button" aria-label="Выйти" title="Выйти">↪</button>
      </div>
    </header>

    <section id="admin-summary" class="admin-summary" aria-label="Сводка"></section>
    <p id="admin-telemetry-scope" class="admin-telemetry-scope"></p>

    <section class="admin-panel admin-users-panel" aria-labelledby="admin-users-title">
      <div class="admin-panel-title">
        <h2 id="admin-users-title">Пользователи</h2>
        <span id="admin-users-count"></span>
      </div>
      <div
        class="admin-table-wrap"
        role="region"
        aria-label="Статистика пользователей"
        tabindex="0"
      >
        <table class="admin-table">
          <caption class="visually-hidden">Статистика активности пользователей</caption>
          <thead>
            <tr>
              <th scope="col">Аккаунт</th>
              <th scope="col">Активность</th>
              <th scope="col">Серии</th>
              <th scope="col">Время</th>
              <th scope="col">Библиотека</th>
              <th scope="col">Последний просмотр</th>
              <th scope="col">Последний вход</th>
            </tr>
          </thead>
          <tbody id="admin-users"></tbody>
        </table>
      </div>
    </section>

    <section class="admin-layout">
      <section class="admin-panel" aria-labelledby="admin-titles-title">
        <div class="admin-panel-title">
          <h2 id="admin-titles-title">Активные тайтлы</h2>
          <span>топ 12</span>
        </div>
        <div id="admin-top-titles" class="admin-title-list"></div>
      </section>

      <section class="admin-panel" aria-labelledby="admin-recent-title">
        <div class="admin-panel-title">
          <h2 id="admin-recent-title">Последние просмотры</h2>
          <span id="admin-telemetry-start"></span>
        </div>
        <div id="admin-recent-activity" class="admin-title-list"></div>
      </section>
    </section>

    <p id="admin-state" class="admin-state" aria-live="polite"></p>
  </main>
  <script src="/static/admin.js"></script>
</body>
</html>
